  .btn-all {

  .guide-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTest(name, qs) {
  const shuffled = shuffle(qs).map(q => {
    const indices = q.opts.map((_, i) => i);
    const si = shuffle(indices);
    return { ...q, displayOpts: si.map(i => q.opts[i]), correctDisplay: si.indexOf(q.ans) };
  });
  state = { view: "test", testName: name, questions: shuffled, current: 0, selected: null, answered: false, score: 0, answers: [], done: false, reviewMode: false, reviewIdx: 0 };
  render();
}

function selectOpt(idx) { if (!state.answered) { state.selected = idx; render(); } }

function submitAnswer() {
  if (state.selected === null) return;
  const correct = state.selected === state.questions[state.current].correctDisplay;
  state.answered = true;
  if (correct) state.score++;
  state.answers.push({ qIdx: state.current, selected: state.selected, correct });
  render();
}

function nextQuestion() {
  if (state.current + 1 >= state.questions.length) { state.done = true; }
  else { state.current++; state.selected = null; state.answered = false; }
  render();
}

function goHome() { state.view = "home"; render(); }
function startReview() { state.reviewMode = true; state.reviewIdx = 0; render(); }
function reviewNav(dir) { state.reviewIdx += dir; render(); }

// ===== RENDER =====
function render() {
  const app = document.getElementById("app");

  if (state.view === "home") {
    const entries = [
      { name: "Joint Forces & Core Missions", count: TESTS["Joint Forces & Core Missions"].length, color: "#4a9eff" },
      { name: "NMO & NDS", count: TESTS["NMO & NDS"].length, color: "#ff6aaa" },
      { name: "Operational Concepts", count: TESTS["Operational Concepts"].length, color: "#7adf4a" },
    ];
    app.innerHTML = `
      <div class="home-header">
        <div class="home-label">Multiple Choice</div>
        <h1 class="home-title">Practice Test</h1>
        <div class="home-divider"></div>
        <p class="home-sub">${ALL_QUESTIONS.length} total questions · 3 study guides</p>
      </div>
      <button class="btn-all" onclick="startTest('Full Exam', ALL_QUESTIONS)">Take Full Exam (${ALL_QUESTIONS.length} questions)</button>
      ${entries.map(t => `
        <div class="guide-section">
          <div class="guide-header">
            <div class="guide-label" style="color:${t.color}">${t.name}</div>
            <button class="guide-btn" style="background:${t.color}15;border:1px solid ${t.color}40;color:${t.color}" onclick="startTest('${t.name}', TESTS['${t.name}'])">Start (${t.count})</button>
          </div>
        </div>
      `).join("")}
    `;
    return;
  }

  if (state.done && state.reviewMode) {
    const missed = state.answers.filter(a => !a.correct);
    const item = missed[state.reviewIdx];
    const q = state.questions[item.qIdx];
    app.innerHTML = `
      <div class="test-top">
        <button class="btn-back" onclick="state.reviewMode=false;render()">← Results</button>
        <span class="progress-num">Review ${state.reviewIdx + 1} / ${missed.length}</span>
      </div>
      <div class="review-card">
        <div class="review-label">Missed</div>
        <div class="review-q">${q.q}</div>
        ${q.displayOpts.map((opt, i) => {
          const isCorrect = i === q.correctDisplay;
          const wasSelected = i === item.selected;
          let cls = "r-neutral", mark = "";
          if (isCorrect) { cls = "r-correct"; mark = "✓"; }
          if (wasSelected && !isCorrect) { cls = "r-wrong"; mark = "✗"; }
          return `<div class="review-opt ${cls}"><span class="review-mark">${mark}</span><span>${opt}</span></div>`;
        }).join("")}
      </div>
      <div class="nav-row">
        <button class="nav-btn nav-prev" ${state.reviewIdx === 0 ? "disabled" : ""} onclick="reviewNav(-1)">Previous</button>
        <button class="nav-btn nav-next" ${state.reviewIdx >= missed.length - 1 ? "disabled" : ""} onclick="reviewNav(1)">Next</button>
      </div>
    `;
    return;
  }

  if (state.done) {
    const pct = Math.round((state.score / state.questions.length) * 100);
    const missed = state.answers.filter(a => !a.correct).length;
    const pctClass = pct >= 80 ? "high" : pct >= 60 ? "mid" : "low";
    app.innerHTML = `
      <div class="results">
        <div class="results-pct ${pctClass}">${pct}%</div>
        <div class="results-label">${state.testName}</div>
        <div class="results-stats">${state.score} correct · ${missed} missed · ${state.questions.length} total</div>
        ${missed > 0 ? `<button class="result-btn review" onclick="startReview()">Review Missed (${missed})</button>` : ""}
        <button class="result-btn retake" onclick="startTest('${state.testName}', ${state.testName === 'Full Exam' ? 'ALL_QUESTIONS' : "TESTS['" + state.testName + "']"})">Retake Test</button>
        <button class="result-btn menu" onclick="goHome()">Back to Menu</button>
      </div>
    `;
    return;
  }

  // TEST QUESTION
  const q = state.questions[state.current];
  const prog = ((state.current + (state.answered ? 1 : 0)) / state.questions.length * 100);
  const missedSoFar = state.answers.filter(a => !a.correct).length;

  app.innerHTML = `
    <div class="test-top">
      <button class="btn-back" onclick="goHome()">← Exit</button>
      <span class="progress-num">${state.current + 1} / ${state.questions.length}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
    <div class="score-row">
      <span class="score-correct">✓ ${state.score}</span>
      <span class="score-wrong">✗ ${missedSoFar}</span>
    </div>
    <div class="question-text">${q.q}</div>
    <div class="options">
      ${q.displayOpts.map((opt, i) => {
        let cls = "opt-btn";
        let circCls = "opt-circle";
        let circText = String.fromCharCode(65 + i);

        if (state.answered) {
          cls += " answered";
          if (i === q.correctDisplay) { cls += " correct"; circCls += " correct-circle"; circText = "✓"; }
          else if (i === state.selected) { cls += " wrong"; circCls += " wrong-circle"; circText = "✗"; }
          else { cls += " dimmed"; }
        } else if (i === state.selected) {
          cls += " selected"; circCls += " selected-circle";
        }

        return `<button class="${cls}" onclick="selectOpt(${i})"><span class="${circCls}">${circText}</span><span>${opt}</span></button>`;
      }).join("")}
    </div>
    ${!state.answered
      ? `<button class="submit-btn ${state.selected !== null ? 'active' : 'disabled'}" onclick="submitAnswer()">Submit Answer</button>`
      : `<button class="submit-btn active" onclick="nextQuestion()">${state.current + 1 >= state.questions.length ? "See Results" : "Next Question →"}</button>`
    }
  `;
}

// Initial render
render();
</script>
</body>
</html>
